<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salesflow — Pricing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #eef0f4;
  --surface: #ffffff;
  --border: #e2e6ed;
  --blue: #3d63f0;
  --blue-light: #eef1fd;
  --blue-mid: #d9e0fb;
  --blue-shadow: rgba(61, 99, 240, 0.28);
  --text: #111827;
  --text-2: #4b5563;
  --text-3: #9ca3af;
  --green: #16a34a;
  --red-badge: #ef4444;
  --font: 'Montserrat', sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 48px 24px 80px;
  -webkit-font-smoothing: antialiased;
}

.pricing-root {
  width: 100%;
  max-width: 1100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

/* ── BILLING TOGGLE ── */
.billing-toggle {
  position: relative;
  display: inline-flex;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 40px;
  box-shadow: 0px 1px 3px 0px rgba(0,0,0,0.07);
  height: 41px;
  padding: 4px;
  width: 302px;
  user-select: none;
}

.billing-toggle__track {
  position: absolute;
  top: 4px;
  left: 4px;
  height: 31px;
  border-radius: 32px;
  background: var(--blue);
  box-shadow: 0px 6px 20px 0px var(--blue-shadow);
  transition: transform 0.22s cubic-bezier(0.35,0,0.25,1), width 0.22s cubic-bezier(0.35,0,0.25,1);
  pointer-events: none;
}

.billing-toggle__btn {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 31px;
  border-radius: 32px;
  cursor: pointer;
  z-index: 1;
  transition: color 0.18s;
  flex-shrink: 0;
}
.billing-toggle__btn--monthly  { width: 90px; }
.billing-toggle__btn--6months  { width: 97px; }
.billing-toggle__btn--12months { width: 101px; }

.billing-toggle__label {
  font-size: 12.5px;
  font-weight: 700;
  color: var(--text-2);
  white-space: nowrap;
  transition: color 0.18s;
}
.billing-toggle__btn.is-active .billing-toggle__label { color: #fff; }

.billing-toggle__btn.is-disabled {
  cursor: not-allowed;
  pointer-events: none;
}
.billing-toggle__btn.is-disabled .billing-toggle__label { color: #c0c4c9; }
.billing-toggle__btn.is-disabled .billing-toggle__badge { background: #f9bebe !important; }

.billing-toggle__badge {
  position: absolute;
  top: -11px;
  right: 0;
  background: var(--red-badge);
  border-radius: 10px;
  height: 15px;
  padding: 0 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.billing-toggle__badge span {
  font-size: 9px;
  font-weight: 800;
  color: #fff;
  white-space: nowrap;
}

/* ── CALCULATOR BOX ── */
.calc-box {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
  padding: 28px 32px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* seats row */
.seats-row {
  display: flex;
  align-items: center;
  gap: 16px;
}
.seats-label {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text);
}

.seats-stepper {
  display: flex;
  align-items: center;
  gap: 0;
}
.seats-stepper__btn {
  width: 38px;
  height: 38px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 9px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 400;
  color: var(--text-2);
  transition: background 0.15s, border-color 0.15s;
  user-select: none;
  font-family: var(--font);
  line-height: 1;
}
.seats-stepper__btn:hover { background: var(--bg); border-color: #c5cad3; }
.seats-stepper__btn:disabled { opacity: 0.35; cursor: not-allowed; }

.seats-stepper__input {
  width: 68px;
  height: 38px;
  border: 1px solid var(--border);
  border-left: none;
  border-right: none;
  background: var(--surface);
  text-align: center;
  font-family: var(--font);
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  outline: none;
  -moz-appearance: textfield;
}
.seats-stepper__input::-webkit-outer-spin-button,
.seats-stepper__input::-webkit-inner-spin-button { -webkit-appearance: none; }

/* ── BANNER ── */
.banner {
  background: var(--blue-light);
  border: 1px solid var(--blue-mid);
  border-radius: 12px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  min-height: 52px;
}

.banner__plan-chip {
  background: var(--blue);
  color: #fff;
  font-size: 10.5px;
  font-weight: 800;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 20px;
  flex-shrink: 0;
}

.banner__price {
  font-size: 15px;
  font-weight: 900;
  color: var(--text);
  white-space: nowrap;
}

.banner__formula {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-2);
  flex: 1;
}

.banner__best {
  background: #dcfce7;
  border: 1px solid #bbf7d0;
  color: var(--green);
  font-size: 10px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}

.banner__sales-nudge {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  white-space: nowrap;
  flex-shrink: 0;
}

.banner__save-text {
  font-size: 12.5px;
  font-weight: 700;
  color: var(--green);
  white-space: nowrap;
  flex-shrink: 0;
}

.banner__switch-btn {
  background: var(--surface);
  border: 1.5px solid #c5cad3;
  border-radius: 8px;
  padding: 6px 14px;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 800;
  color: var(--text-2);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  flex-shrink: 0;
}
.banner__switch-btn:hover { background: var(--bg); border-color: var(--blue); color: var(--blue); }

.banner__billing-save {
  margin-left: auto;
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── PLAN CARDS ── */
.plan-cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  width: 100%;
}

.plan-card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  padding-top: 22px;
  cursor: pointer;
  transition: border-color 0.18s, box-shadow 0.18s, opacity 0.18s;
}
.plan-card:hover:not(.plan-card--disabled) {
  border-color: #c5cad3;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.plan-card--selected {
  border-color: var(--blue) !important;
  box-shadow:
    0px 0px 0px 3px rgba(61,99,240,0.1),
    0px 12px 40px 0px rgba(0,0,0,0.09),
    0px 4px 12px 0px rgba(0,0,0,0.05) !important;
}

.plan-card__selected-badge {
  display: none;
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--blue);
  border-radius: 20px;
  box-shadow: 0px 6px 20px 0px var(--blue-shadow);
  height: 19px;
  padding: 0 12px;
  align-items: center;
  white-space: nowrap;
}
.plan-card--selected .plan-card__selected-badge { display: flex; }
.plan-card__selected-badge span {
  font-size: 10px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.plan-card__name-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 14px;
}
.plan-card__name {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: var(--text);
}

/* info icon */
.info-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--blue-light);
  border: 1px solid var(--blue-mid);
  font-size: 9px;
  font-weight: 800;
  color: var(--blue);
  cursor: help;
  flex-shrink: 0;
  position: relative;
}
.info-icon .tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 7px);
  left: 50%;
  transform: translateX(-50%);
  background: #1f2937;
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  line-height: 1.5;
  padding: 6px 10px;
  border-radius: 7px;
  white-space: nowrap;
  pointer-events: none;
  box-shadow: 0 4px 14px rgba(0,0,0,0.22);
  z-index: 10;
}
.info-icon .tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: #1f2937;
}
.info-icon:hover .tooltip { display: block; }

.plan-card__price {
  display: flex;
  align-items: baseline;
  gap: 0;
  margin-bottom: 10px;
}
.plan-card__from {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  margin-right: 3px;
}
.plan-card__amount {
  font-size: 30px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -1.5px;
  line-height: 30px;
  transition: color 0.2s;
}
.plan-card__period {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  margin-left: 2px;
}

.plan-card__meta {
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  height: 30px;
  display: flex;
  align-items: center;
  margin-bottom: 14px;
}
.plan-card__meta-text {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
}
.plan-card__meta-text strong {
  font-weight: 800;
  color: var(--text);
}

.plan-card__btn {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 36px;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  width: 100%;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-2);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.plan-card--selected .plan-card__btn {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
  box-shadow: 0px 6px 20px 0px var(--blue-shadow);
}
.plan-card__btn:hover { background: var(--bg); }
.plan-card--selected .plan-card__btn:hover { background: #2e52d6; border-color: #2e52d6; }

/* Sales text — restricted plans on 6mo/12mo */
.plan-card__sales-text {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-3);
  margin-bottom: 10px;
  min-height: 30px;
  display: flex;
  align-items: center;
  white-space: nowrap;
}


</style>
</head>
<body>

<div class="pricing-root">

  <!-- BILLING TOGGLE -->
  <div class="billing-toggle" id="billing-toggle" role="radiogroup" aria-label="Billing period">
    <div class="billing-toggle__track" id="billing-track"></div>

    <div class="billing-toggle__btn billing-toggle__btn--monthly"
         role="radio" data-period="monthly" tabindex="0">
      <span class="billing-toggle__label">Monthly</span>
    </div>

    <div class="billing-toggle__btn billing-toggle__btn--6months"
         role="radio" data-period="6months" tabindex="-1">
      <span class="billing-toggle__label">6 Months</span>
      <div class="billing-toggle__badge"><span>−15%</span></div>
    </div>

    <div class="billing-toggle__btn billing-toggle__btn--12months"
         role="radio" data-period="12months" tabindex="-1">
      <span class="billing-toggle__label">12 Months</span>
      <div class="billing-toggle__badge"><span>−30%</span></div>
    </div>
  </div>

  <!-- CALCULATOR BOX -->
  <div class="calc-box">

    <!-- Seats row -->
    <div class="seats-row">
      <span class="seats-label">How many seats do you need?</span>
      <div class="seats-stepper">
        <button class="seats-stepper__btn" id="btn-minus" aria-label="Decrease seats">−</button>
        <input class="seats-stepper__input" id="seats-input" type="number" value="1" min="1" max="500" />
        <button class="seats-stepper__btn" id="btn-plus" aria-label="Increase seats">+</button>
      </div>
    </div>

    <!-- Banner -->
    <div class="banner" id="banner"></div>

  </div>

  <!-- PLAN CARDS -->
  <div class="plan-cards" id="plan-cards"></div>

</div>

<script>
// ── DATA ──
const PLANS = [
  {
    id: 'basic',
    name: 'Basic',
    minSeats: 1,
    step: 1,
    prices: { monthly: 99, '6months': 84.15, '12months': 69.30 },
    btn: 'Try for free',
    restricted: false,
  },
  {
    id: 'starter',
    name: 'Starter',
    minSeats: 5,
    step: 1,
    prices: { monthly: 70, '6months': 59.50, '12months': 49 },
    btn: 'Book a demo',
    restricted: false,
  },
  {
    id: 'pro',
    name: 'Pro',
    minSeats: 20,
    step: 1,
    prices: { monthly: 39.95, '6months': 33.96, '12months': 27.97 },
    btn: 'Book a demo',
    restricted: false,
  },
  {
    id: 'agency',
    name: 'Agency',
    minSeats: 50,
    step: 5,
    prices: { monthly: 29.98, '6months': null, '12months': null },
    btn: 'Book a demo',
    restricted: true,
  },
  {
    id: 'enterprise',
    name: 'Enterprise',
    minSeats: 100,
    step: 10,
    prices: { monthly: 24.99, '6months': null, '12months': null },
    btn: 'Book a demo',
    restricted: true,
  },
];

// ── STATE ──
let state = {
  period: '12months',
  planId: 'basic',
  seats: 1,
};

// ── HELPERS ──
function fmt(n) {
  if (n === null) return '—';
  const s = n.toFixed(2);
  return '$' + (s.endsWith('.00') ? n.toFixed(0) : s);
}

function fmtTotal(n) {
  // Show up to 1 decimal, strip trailing zero
  const s = n.toFixed(1);
  return '$' + (s.endsWith('.0') ? n.toFixed(0) : s);
}

function getPlan(id) { return PLANS.find(p => p.id === id); }

function getPlanIndex(id) { return PLANS.findIndex(p => p.id === id); }

function getPrice(plan, period) {
  return plan.prices[period];
}

function totalCost(plan, seats, period) {
  const price = getPrice(plan, period);
  if (price === null) return null;
  const months = period === '12months' ? 12 : period === '6months' ? 6 : 1;
  return price * seats * months;
}

function roundSeats(planId, seats) {
  const plan = getPlan(planId);
  if (!plan) return seats;
  if (plan.step === 1) return seats;
  return Math.ceil(seats / plan.step) * plan.step;
}

// ── TOGGLE LOGIC ──
const toggleBtns = document.querySelectorAll('.billing-toggle__btn');
const track = document.getElementById('billing-track');

const TOGGLE_META = {
  monthly:  { width: 90,  offset: 0 },
  '6months':  { width: 97,  offset: 90 },
  '12months': { width: 101, offset: 187 },
};

function applyToggle(period) {
  const { width, offset } = TOGGLE_META[period];
  track.style.width = width + 'px';
  track.style.transform = `translateX(${offset}px)`;
  toggleBtns.forEach(b => {
    const active = b.dataset.period === period;
    b.classList.toggle('is-active', active);
    b.setAttribute('aria-checked', active);
    b.tabIndex = active ? 0 : -1;
  });
}

function setToggleDisabled() {
  const plan = getPlan(state.planId);
  const isRestricted = plan && plan.restricted;
  toggleBtns.forEach(b => {
    const period = b.dataset.period;
    const shouldDisable = isRestricted && (period === '6months' || period === '12months');
    b.classList.toggle('is-disabled', shouldDisable);
  });
}

toggleBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.classList.contains('is-disabled')) return;
    state.period = btn.dataset.period;
    applyToggle(state.period);
    render();
  });
});

// ── SEATS LOGIC ──
const seatsInput = document.getElementById('seats-input');
const btnMinus = document.getElementById('btn-minus');
const btnPlus = document.getElementById('btn-plus');

// Returns the highest plan whose minSeats <= val (within current frequency)
function bestPlanForSeats(val) {
  let best = PLANS[0];
  for (const p of PLANS) {
    const price = getPrice(p, state.period);
    if (price === null) continue; // plan not available on this frequency
    if (p.minSeats <= val) best = p;
  }
  return best;
}

function setSeats(n) {
  const plan = getPlan(state.planId);
  const min = plan.minSeats;
  const clamped = Math.max(min, Math.min(500, n));
  state.seats = clamped;
  seatsInput.value = clamped;
  btnMinus.disabled = clamped <= min;
  render();
}

btnMinus.addEventListener('click', () => {
  const plan = getPlan(state.planId);
  setSeats(state.seats - plan.step);
});

btnPlus.addEventListener('click', () => {
  const plan = getPlan(state.planId);
  setSeats(state.seats + plan.step);
});

function handleManualSeatInput() {
  let val = parseInt(seatsInput.value, 10);
  if (isNaN(val) || val < 1) val = getPlan(state.planId).minSeats;
  val = Math.min(500, val);

  const currentPlan = getPlan(state.planId);

  if (val < currentPlan.minSeats) {
    // Auto-switch to the best-fit plan for this seat count
    const targetPlan = bestPlanForSeats(val);
    const roundedVal = roundSeats(targetPlan.id, val);
    state.planId = targetPlan.id;
    state.seats = roundedVal;
    seatsInput.value = roundedVal;
    setToggleDisabled();
    render();
  } else {
    val = roundSeats(state.planId, val);
    setSeats(val);
  }
}

seatsInput.addEventListener('change', handleManualSeatInput);

seatsInput.addEventListener('blur', handleManualSeatInput);

// ── BANNER ──
function renderBanner() {
  const plan = getPlan(state.planId);
  const price = getPrice(plan, state.period);
  const seats = state.seats;
  const period = state.period;

  // Banner formula
  let priceStr = fmt(price);
  let formulaHtml = '';
  let totalStr = '';
  let isUpfront = period !== 'monthly';

  if (period === '12months') {
    const tot = price * seats * 12;
    totalStr = fmtTotal(tot);
    formulaHtml = `paid upfront:&nbsp; ${seats} seat${seats !== 1 ? 's' : ''} × ${priceStr}/seat × 12 mo = ${totalStr}`;
  } else if (period === '6months') {
    const tot = price * seats * 6;
    totalStr = fmtTotal(tot);
    formulaHtml = `paid upfront:&nbsp; ${seats} seat${seats !== 1 ? 's' : ''} × ${priceStr}/seat × 6 mo = ${totalStr}`;
  } else {
    const tot = price * seats;
    totalStr = fmtTotal(tot);
    formulaHtml = `&nbsp;${seats} seat${seats !== 1 ? 's' : ''} × ${priceStr}/seat = ${totalStr}`;
  }

  // Upgrade suggestion — find the best-value plan across all higher tiers
  let upgradeSuggestion = null;
  const planIdx = getPlanIndex(plan.id);
  const currentTotal = totalCost(plan, seats, period);
  let bestSavings = 0;

  for (let i = planIdx + 1; i < PLANS.length; i++) {
    const nextPlan = PLANS[i];
    const nextPrice = getPrice(nextPlan, period);
    if (nextPrice === null) continue;
    const effectiveSeats = Math.max(nextPlan.minSeats, Math.ceil(seats / nextPlan.step) * nextPlan.step);
    const nextTotal = totalCost(nextPlan, effectiveSeats, period);
    if (nextTotal !== null && currentTotal !== null && currentTotal > nextTotal) {
      const savings = currentTotal - nextTotal;
      if (savings > bestSavings) {
        bestSavings = savings;
        upgradeSuggestion = {
          plan: nextPlan,
          effectiveSeats,
          savings: fmtTotal(savings),
        };
      }
    }
  }

  // "Save with billing" hint — when on monthly, show 6mo savings; when on 6mo, show 12mo savings
  let billingSave = null;
  if (period === 'monthly' && !plan.restricted) {
    const sixMonthPrice = getPrice(plan, '6months');
    if (sixMonthPrice !== null) {
      const currentTotal = price * seats * 6;
      const sixTotal = sixMonthPrice * seats * 6;
      const saved = currentTotal - sixTotal;
      if (saved > 0) billingSave = { amount: fmtTotal(saved), label: '6 Months' };
    }
  } else if (period === '6months' && !plan.restricted) {
    const twelvePrice = getPrice(plan, '12months');
    if (twelvePrice !== null) {
      const currentTotal = price * seats * 12;
      const twelveTotal = twelvePrice * seats * 12;
      const saved = currentTotal - twelveTotal;
      if (saved > 0) billingSave = { amount: fmtTotal(saved), label: '12 Months' };
    }
  }

  // Best value badge: show on 12months with no upgrade suggestion
  const showBest = period === '12months' && !upgradeSuggestion;

  // Sales nudge: 50+ seats on 6mo or 12mo
  const showSalesNudge = (period === '6months' || period === '12months') && seats >= 50 && !upgradeSuggestion;

  const banner = document.getElementById('banner');
  let html = `
    <span class="banner__plan-chip">${plan.name}</span>
    <span class="banner__price">${priceStr}/seat</span>
    <span class="banner__formula">${formulaHtml}</span>
  `;

  if (showBest && !showSalesNudge) {
    html += `<span class="banner__best">Best value</span>`;
  }

  if (showSalesNudge) {
    html += `<span class="banner__sales-nudge">For a better price, speak with our Sales team</span>`;
  }

  if (upgradeSuggestion) {
    const seatNote = upgradeSuggestion.effectiveSeats !== seats
      ? ` (${upgradeSuggestion.effectiveSeats} seats)`
      : '';
    html += `<span class="banner__save-text">Save ${upgradeSuggestion.savings} with ${upgradeSuggestion.plan.name}${seatNote}</span>`;
    html += `<button class="banner__switch-btn" data-switch="${upgradeSuggestion.plan.id}" data-seats="${upgradeSuggestion.effectiveSeats}">Switch to ${upgradeSuggestion.plan.name}</button>`;
  }

  if (billingSave) {
    html += `<span class="banner__billing-save">💡 Save ${billingSave.amount} with ${billingSave.label}</span>`;
  }

  banner.innerHTML = html;

  // Bind switch button
  const switchBtn = banner.querySelector('.banner__switch-btn');
  if (switchBtn) {
    switchBtn.addEventListener('click', () => {
      const targetId = switchBtn.dataset.switch;
      const targetSeats = parseInt(switchBtn.dataset.seats, 10);
      selectPlan(targetId, targetSeats);
    });
  }
}

// ── PLAN CARDS ──
function renderCards() {
  const container = document.getElementById('plan-cards');
  container.innerHTML = '';

  PLANS.forEach(plan => {
    const isSelected = plan.id === state.planId;
    const price = getPrice(plan, state.period);
    const showSalesText = plan.restricted && state.period !== 'monthly';
    const displayPrice = price !== null ? price : plan.prices['monthly'];

    const card = document.createElement('div');
    card.className = 'plan-card' + (isSelected ? ' plan-card--selected' : '');
    card.dataset.planId = plan.id;

    const metaLabel = plan.minSeats === 1 ? '1+ users' : `${plan.minSeats}+ seats`;

    const priceAreaHtml = showSalesText
      ? `<div class="plan-card__sales-text">Speak with our Sales team</div>`
      : `<div class="plan-card__price">
           <span class="plan-card__from">from $</span>
           <span class="plan-card__amount">${fmt(displayPrice).replace('$', '')}</span>
           <span class="plan-card__period">/seat</span>
         </div>`;

    card.innerHTML = `
      <div class="plan-card__selected-badge"><span>✓ Selected</span></div>
      <div class="plan-card__name-row">
        <span class="plan-card__name">${plan.name}</span>
      </div>
      ${priceAreaHtml}
      <div class="plan-card__meta">
        <span class="plan-card__meta-text">Team size: <strong>${metaLabel}</strong></span>
      </div>
      <button class="plan-card__btn">${plan.btn}</button>
    `;

    card.addEventListener('click', () => selectPlan(plan.id));

    container.appendChild(card);
  });
}

function selectPlan(planId, overrideSeats) {
  const plan = getPlan(planId);
  if (!plan) return;

  if (plan.restricted && state.period !== 'monthly') {
    state.period = 'monthly';
    applyToggle('monthly');
  }

  state.planId = planId;
  state.seats = overrideSeats !== undefined ? overrideSeats : plan.minSeats;
  seatsInput.value = state.seats;

  setToggleDisabled();
  render();
}

function render() {
  setToggleDisabled();
  renderBanner();
  renderCards();

  const plan = getPlan(state.planId);
  btnMinus.disabled = state.seats <= plan.minSeats;
}

// ── INIT ──
// Set default: 12months active for Basic
applyToggle('12months');
selectPlan('basic');
</script>
